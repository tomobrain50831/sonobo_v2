<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>腹部大動脈 — ソノボ君</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a6fd4;
    --primary-light: #4a9eff;
    --primary-dark: #0d4fa0;
    --accent: #00c8a0;
    --accent2: #ff6b35;
    --bg: #f0f6ff;
    --card: #ffffff;
    --text: #1a2540;
    --text-light: #5a6a8a;
    --shadow: 0 4px 24px rgba(26,111,212,0.12);
    --shadow-lg: 0 8px 40px rgba(26,111,212,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .app-header {
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    width: 52px;
    height: 52px;
    flex-shrink: 0;
  }

  .header-title {
    color: white;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }

  .header-title h1 {
    font-size: 1.3rem;
    font-weight: 800;
    line-height: 1.2;
  }

  .header-title p {
    font-size: 0.75rem;
    opacity: 0.85;
    font-weight: 400;
  }

  .progress-bar-wrap {
    margin-left: auto;
    text-align: right;
    color: white;
    font-size: 0.75rem;
    opacity: 0.9;
    min-width: 120px;
  }

  .progress-bar {
    width: 120px;
    height: 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    margin-top: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* ===== CHAPTER NAV ===== */
  .chapter-nav {
    background: white;
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    scrollbar-width: none;
  }

  .chapter-nav::-webkit-scrollbar { display: none; }

  .chapter-btn {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    border: 2px solid #e0e8f8;
    background: white;
    color: var(--text-light);
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }

  .chapter-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: #f0f6ff;
  }

  .chapter-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .chapter-btn.completed {
    background: #e8faf5;
    border-color: var(--accent);
    color: #009979;
  }

  /* ===== MAIN LAYOUT ===== */
  .main {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  /* ===== SONOBO CHAT ===== */
  .chat-bubble-wrap {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 20px;
    animation: fadeInUp 0.4s ease;
  }

  .sonobo-avatar {
    width: 64px;
    height: 64px;
    flex-shrink: 0;
    filter: drop-shadow(0 4px 8px rgba(26,111,212,0.3));
    animation: bounce 3s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .chat-bubble {
    background: white;
    border-radius: 20px 20px 20px 4px;
    padding: 16px 20px;
    box-shadow: var(--shadow);
    flex: 1;
    font-size: 0.95rem;
    line-height: 1.7;
    border-left: 4px solid var(--primary);
    position: relative;
  }

  .chat-bubble::before {
    content: '';
    position: absolute;
    left: -8px;
    bottom: 16px;
    border: 8px solid transparent;
    border-right-color: white;
    border-left: none;
  }

  .chat-bubble .speaker {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-weight: 800;
    color: var(--primary);
    font-size: 0.8rem;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ===== CONTENT CARD ===== */
  .content-card {
    background: white;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    animation: fadeInUp 0.4s ease;
  }

  .card-title {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--primary-dark);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title .icon {
    font-size: 1.3rem;
  }

  .content-card ul {
    list-style: none;
    padding: 0;
  }

  .content-card ul li {
    padding: 8px 0 8px 24px;
    position: relative;
    font-size: 0.9rem;
    line-height: 1.6;
    border-bottom: 1px solid #f0f4ff;
  }

  .content-card ul li:last-child { border-bottom: none; }

  .content-card ul li::before {
    content: '▶';
    position: absolute;
    left: 0;
    color: var(--primary-light);
    font-size: 0.65rem;
    top: 12px;
  }

  .highlight-box {
    background: linear-gradient(135deg, #fff3cd, #fff8e1);
    border: 2px solid #ffc107;
    border-radius: 12px;
    padding: 14px 16px;
    margin: 12px 0;
    font-size: 0.9rem;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .highlight-box .emoji { font-size: 1.4rem; }

  .tip-box {
    background: linear-gradient(135deg, #e8f8f3, #d4f1e8);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 14px 16px;
    margin: 12px 0;
    font-size: 0.9rem;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .warn-box {
    background: linear-gradient(135deg, #fff0f0, #ffe8e8);
    border: 2px solid #ff6b6b;
    border-radius: 12px;
    padding: 14px 16px;
    margin: 12px 0;
    font-size: 0.9rem;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  /* ===== PROBE TABLE ===== */
  .probe-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    margin: 12px 0;
  }

  .probe-table th {
    background: var(--primary);
    color: white;
    padding: 10px 12px;
    text-align: center;
    font-weight: 700;
  }

  .probe-table th:first-child { border-radius: 10px 0 0 0; }
  .probe-table th:last-child { border-radius: 0 10px 0 0; }

  .probe-table td {
    padding: 9px 12px;
    text-align: center;
    border-bottom: 1px solid #e8f0ff;
  }

  .probe-table tr:nth-child(even) td { background: #f5f8ff; }
  .probe-table tr:last-child td:first-child { border-radius: 0 0 0 10px; }
  .probe-table tr:last-child td:last-child { border-radius: 0 0 10px 0; }

  .probe-icon {
    font-size: 1.5rem;
    display: block;
    margin: 0 auto 4px;
  }

  /* ===== QUIZ ===== */
  .btn-quiz-reveal {
    display: block;
    width: 100%;
    padding: 14px 20px;
    background: linear-gradient(135deg, #e8f0ff, #d4e4ff);
    color: var(--primary-dark);
    border: 2px dashed var(--primary-light);
    border-radius: 14px;
    font-size: 0.95rem;
    font-weight: 800;
    cursor: pointer;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    transition: all 0.2s;
    margin: 14px 0 0;
    text-align: center;
  }

  .btn-quiz-reveal:hover {
    background: linear-gradient(135deg, #dce8ff, #c4d8ff);
    border-color: var(--primary);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(26,111,212,0.2);
  }

  .quiz-card {
    background: linear-gradient(135deg, #f0f6ff, #e8f0ff);
    border: 3px solid var(--primary-light);
    border-radius: 20px;
    padding: 20px;
    margin: 16px 0;
    animation: fadeInUp 0.4s ease;
  }

  .quiz-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .quiz-badge {
    background: var(--primary);
    color: white;
    font-size: 0.7rem;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 12px;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }

  .quiz-question {
    font-weight: 700;
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 14px;
    color: var(--primary-dark);
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .quiz-option {
    background: white;
    border: 2px solid #c8d8f8;
    border-radius: 12px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 0.88rem;
    line-height: 1.5;
    transition: all 0.2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .quiz-option:hover:not(:disabled) {
    border-color: var(--primary);
    background: #f0f6ff;
    transform: translateX(4px);
  }

  .quiz-option .opt-label {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #e8f0ff;
    color: var(--primary);
    font-weight: 800;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }

  .quiz-option.correct {
    border-color: var(--accent);
    background: #e8faf5;
  }

  .quiz-option.correct .opt-label {
    background: var(--accent);
    color: white;
  }

  .quiz-option.wrong {
    border-color: #ff6b6b;
    background: #fff0f0;
  }

  .quiz-option.wrong .opt-label {
    background: #ff6b6b;
    color: white;
  }

  .quiz-option:disabled { cursor: default; }

  .quiz-feedback {
    margin-top: 14px;
    padding: 14px;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.6;
    display: none;
  }

  .quiz-feedback.show { display: block; animation: fadeInUp 0.3s ease; }

  .quiz-feedback.correct-fb {
    background: #e8faf5;
    border: 2px solid var(--accent);
    color: #006b50;
  }

  .quiz-feedback.wrong-fb {
    background: #fff0f0;
    border: 2px solid #ff6b6b;
    color: #c00;
  }

  /* ===== ECHO IMAGE VIEWER ===== */
  .echo-viewer {
    background: #0a0a1a;
    border-radius: 16px;
    padding: 16px;
    margin: 12px 0;
    position: relative;
    overflow: hidden;
  }

  .echo-viewer-title {
    color: #4af;
    font-size: 0.75rem;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }

  .echo-diagram {
    width: 100%;
    border-radius: 8px;
    display: block;
  }

  /* SVG diagrams */
  .svg-container {
    width: 100%;
    margin: 12px 0;
    border-radius: 12px;
    overflow: hidden;
  }

  /* ===== NEXT BUTTON ===== */
  .btn-next {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(26,111,212,0.3);
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-next:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(26,111,212,0.4);
  }

  .btn-next:active { transform: translateY(0); }

  /* ===== SECTION HEADER ===== */
  .section-header {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: white;
    border-radius: 16px;
    padding: 20px 24px;
    margin: 20px 0 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .section-header .section-icon {
    font-size: 2.4rem;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }

  .section-header h2 {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    line-height: 1.3;
  }

  .section-header p {
    font-size: 0.8rem;
    opacity: 0.85;
    margin-top: 2px;
  }

  /* ===== STEP INDICATOR ===== */
  .step-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 12px 0;
  }

  .step-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 12px 14px;
    background: #f8faff;
    border-radius: 12px;
    border-left: 4px solid var(--primary-light);
  }

  .step-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    font-weight: 800;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }

  .step-text {
    font-size: 0.9rem;
    line-height: 1.6;
    padding-top: 3px;
  }

  /* ===== COMPLETION ===== */
  .completion-card {
    background: linear-gradient(135deg, #0d4fa0, #1a6fd4, #4a9eff);
    color: white;
    border-radius: 24px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    animation: fadeInUp 0.5s ease;
    margin: 24px 0;
  }

  .completion-card h2 {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    margin: 12px 0 8px;
  }

  .completion-card p {
    opacity: 0.9;
    font-size: 0.95rem;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .score-display {
    background: rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 16px;
    margin: 16px 0;
    font-size: 2.5rem;
    font-weight: 800;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  /* ===== TOP MENU BUTTONS ===== */
  .menu-section-label {
    font-size: 0.72rem;
    font-weight: 900;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 2px 4px;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    border-left: 3px solid var(--primary-light);
    padding-left: 8px;
  }

  .menu-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border: 2px solid #e0e8f8;
    border-radius: 14px;
    padding: 13px 14px;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    width: 100%;
  }

  .menu-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: #f4f8ff;
    transform: translateX(3px);
    box-shadow: 0 3px 12px rgba(26,111,212,0.12);
  }

  .menu-btn:active:not(:disabled) { transform: translateX(1px); }

  .menu-disabled {
    opacity: 0.5;
    cursor: not-allowed;
    background: #fafafa;
  }

  .menu-icon {
    font-size: 1.6rem;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
  }

  .menu-text { flex: 1; min-width: 0; }

  .menu-title {
    font-weight: 800;
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.3;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }

  .menu-sub {
    font-size: 0.75rem;
    color: var(--text-light);
    margin-top: 2px;
    line-height: 1.4;
  }

  .menu-arrow {
    font-size: 1.4rem;
    color: var(--primary-light);
    flex-shrink: 0;
    font-weight: 300;
  }

  .menu-badge-soon {
    background: #f0f0f0;
    color: #999;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
    flex-shrink: 0;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    white-space: nowrap;
  }

  /* ===== SCREEN MANAGEMENT ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== ANATOMY LABEL ===== */
  .label-box {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.8rem;
    color: #fff;
    font-weight: 600;
  }

  /* ===== BADGE ===== */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent);
    color: white;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.75rem;
    font-weight: 700;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }

  /* ===== PROBE CARD ===== */
  .probe-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 12px 0;
  }

  .probe-card {
    background: linear-gradient(135deg, #f0f6ff, #e8f0ff);
    border: 2px solid #c8d8f8;
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    transition: all 0.2s;
  }

  .probe-card:hover {
    border-color: var(--primary);
    transform: translateY(-3px);
    box-shadow: var(--shadow);
  }

  .probe-card-icon { font-size: 2rem; margin-bottom: 6px; }

  .probe-card-name {
    font-weight: 800;
    font-size: 0.85rem;
    color: var(--primary-dark);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    margin-bottom: 4px;
  }

  .probe-card-sub {
    font-size: 0.72rem;
    color: var(--text-light);
    line-height: 1.4;
  }

  /* View tabs */
  .view-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .view-tab {
    padding: 7px 14px;
    border-radius: 10px;
    border: 2px solid #e0e8f8;
    background: white;
    color: var(--text-light);
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }

  .view-tab.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeInUp 0.3s ease; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <img src="" id="headerLogo" alt="ソノボ君" class="header-logo" style="width:52px;height:52px;object-fit:contain"/>
  <div class="header-title">
    <h1>ソノボ君と学ぶ<br>ポイントオブケアエコー</h1>
    <p>Point-of-Care Ultrasound Learning</p>
  </div>
  <div class="progress-bar-wrap">
    <div id="progressText">0 / 0 完了</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</header>

<nav class="chapter-nav" id="chapterNav">
  <button class="chapter-btn" onclick="window.location.href='index.html'">🏠 メニュー</button>
  <button class="chapter-btn active" id="mainChapterBtn">📖 腹部大動脈</button>
</nav>

<main class="main" id="mainContent"></main>

let quizScores = { correct: 0, total: 0 };

function slideImg(key, caption='') {
  return `<div style="margin:14px 0;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.15)">
    <img src="${SLIDES[key]}" alt="${caption}" style="width:100%;display:block;border-radius:14px 14px 0 0"/>

function sonoboSVG(size=72) {
  return `<img src="${SLIDES.sonobo_avatar}" alt="ソノボ君" style="width:${size}px;height:${size}px;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(26,111,212,0.3));animation:bounce 3s ease-in-out infinite;" class="sonobo-avatar"/>`;

}

// ==============================
// HELPER: quiz
// ==============================
let quizCounter = 0;
function quiz(question, options, correctIdx, explanation) {
  const id = 'q' + (++quizCounter);
  quizScores.total++;
  return `<div>
    <button class="btn-quiz-reveal" id="${id}_reveal" onclick="revealQuiz('${id}')">
      📝 理解度チェック！クイズに挑戦する
    </button>
    <div class="quiz-card" id="${id}_card" style="display:none;margin-top:0">
      <div class="quiz-header">
        <span class="quiz-badge">📝 クイズ</span>
      </div>
      <div class="quiz-question">${question}</div>
      <div class="quiz-options" id="${id}_opts">
        ${options.map((o,i)=>`
          <button class="quiz-option" onclick="answerQuiz('${id}',${i},${correctIdx},'${encodeURIComponent(explanation)}')" id="${id}_opt${i}">
            <span class="opt-label">${String.fromCharCode(65+i)}</span>
            <span>${o}</span>
          </button>
        `).join('')}
      </div>
      <div class="quiz-feedback" id="${id}_fb"></div>
    </div>
  </div>`;
}

function revealQuiz(id) {
  document.getElementById(id+'_reveal').style.display = 'none';
  const card = document.getElementById(id+'_card');
  card.style.display = 'block';
  card.style.animation = 'fadeInUp 0.35s ease';
  card.scrollIntoView({behavior:'smooth', block:'nearest'});
}

  const explanation = decodeURIComponent(expEnc);
  const opts = document.querySelectorAll(`#${id}_opts button`);
  opts.forEach((b,i) => {
    b.disabled = true;
    if(i===correct) b.classList.add('correct');
    else if(i===selected) b.classList.add('wrong');
  });
  const fb = document.getElementById(id+'_fb');
  fb.classList.add('show');
  if(selected===correct){
    fb.classList.add('correct-fb');
    fb.innerHTML = `✅ <strong>正解！</strong> ${explanation}`;
    quizScores.correct++;
  } else {
    fb.classList.add('wrong-fb');
    fb.innerHTML = `❌ <strong>不正解。</strong>正解は「${String.fromCharCode(65+correct)}」です。<br>${explanation}`;
  }
  updateProgress();
}

// ==============================
// NAVIGATION
// ==============================
function goChapter(idx) {
  currentChapter = idx;
  currentStep = 0;
  updateChapterNav();
  renderStep();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextStep() {
  if (currentStep < chapters[currentChapter].steps.length - 1) {
    currentStep++;
    renderStep();
  } else {
    // move to next chapter
    if (currentChapter < chapters.length - 1) {
      const btns = document.querySelectorAll('.chapter-btn');
      btns[currentChapter].classList.add('completed');
      currentChapter++;
      currentStep = 0;
      updateChapterNav();
    }
    renderStep();
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
  updateProgress();
}

function updateChapterNav() {
  const btns = document.querySelectorAll('.chapter-btn');
  btns.forEach((b,i) => {
    b.classList.remove('active');
    if (i === currentChapter) b.classList.add('active');
  });
}

function updateProgress() {
  const total = chapters.reduce((s,c)=>s+c.steps.length, 0);
  let done = 0;
  for (let i=0; i<currentChapter; i++) done += chapters[i].steps.length;
  done += currentStep;
  const pct = Math.round((done/total)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = done+' / '+total+' 完了';
}

function renderStep() {
  const content = document.getElementById('mainContent');
  content.innerHTML = chapters[currentChapter].steps[currentStep]();
  updateProgress();
}
